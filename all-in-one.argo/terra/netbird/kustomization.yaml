apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: terra-vpn
namespace: vpn

generatorOptions:
  disableNameSuffixHash: true

resources:
  - job.yaml
  - volume.yaml

configMapGenerator:
  - name: terra-vpn-config
    namespace: vpn
    files:
      - ./terra-map/main.tf
      - ./terra-map/group.tf
      - ./terra-map/kubernetes-peer.tf
      - ./terra-map/dns.tf
      - ./terra-map/che-cluster.tf
      - ./terra-map/kamalos.tf
